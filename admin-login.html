<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login – Meera's Henna Art</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="admin-login-wrapper">
  <div class="admin-login-card">

    <div class="logo">
      <span>🌿</span>
      <h2>Meera's Henna Art</h2>
      <p>Admin Portal</p>
    </div>

    <div class="error-msg" id="login-error"></div>

    <form id="admin-login-form">
      <div class="form-group">
        <label for="admin-email">Email Address</label>
        <input type="email" id="admin-email" placeholder="admin@meerahenna.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="admin-password">Password</label>
        <input type="password" id="admin-password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-primary btn-full" style="margin-top:8px;">
        Sign In →
      </button>
    </form>

    <p style="text-align:center;margin-top:20px;font-size:0.82rem;color:var(--henna-muted);">
      <a href="index.html" style="color:var(--henna-warm);text-decoration:none;">← Back to Website</a>
    </p>
  </div>
</div>

<script src="../js/app.js"></script>
<script>
  // If already logged in, go to dashboard
  if (localStorage.getItem('mh_admin_auth')) {
    window.location.href = 'admin-dashboard.html';
  }
  document.getElementById('admin-login-form').addEventListener('submit', adminLogin);
</script>
</body>
</html>
